<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - Agentic</title>
<link rel="stylesheet" href="/css/style.css?v=80">
<style>
  .main { overflow-y: auto; overflow-x: clip; scrollbar-width: thin; scrollbar-color: var(--text-muted) transparent; }
  .settings-view { overflow: visible; height: auto; }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->

  <div class="col-resize" id="sidebarResize"></div>

  <!-- Main Area: Settings -->
  <div class="main">
    <div class="settings-view">
      <div class="settings-topbar">
        <span class="settings-title">Settings</span>
      </div>
      <div class="settings-body">
        <div class="settings-nav">
          <div class="settings-nav-item active" data-section="providers" onclick="switchSettingsSection(this)">LLM Providers</div>
          <div class="settings-nav-item" data-section="general" onclick="switchSettingsSection(this)">General</div>
        </div>
        <div class="settings-content" id="settingsContent">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Application Scripts (subset needed for settings) -->
<script src="/js/state.js"></script>
<script src="/js/helpers.js?v=13"></script>
<script src="/js/sidebar.js?v=2"></script>
<script src="/js/providers.js"></script>
<script src="/js/settings.js?v=5"></script>
<script src="/js/ui.js"></script>
<script>
// Minimal init for settings page
var _isSettingsPage = true;

function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');
  ws.onopen = function() {
    updateStatus('connected');
    ws.send(JSON.stringify({ action: 'list_conversations' }));
  };
  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      if (msg.type === 'conversations_list' || msg.type === 'history_list') {
        var data = msg.data || [];
        data.forEach(function(c) {
          if (!conversations[c.id]) {
            conversations[c.id] = { id: c.id, title: c.title, messages: [] };
          }
        });
        renderConversations();
      } else if (msg.type === 'functions_list') {
        availableFunctions = msg.data || [];
        if (typeof loadProgramsMeta === 'function') {
          loadProgramsMeta().then(function() { renderFunctions(); });
        } else {
          renderFunctions();
        }
      }
    } catch(err) {}
  };
  ws.onclose = function() {
    updateStatus('disconnected');
    setTimeout(connect, 2000);
  };
  ws.onerror = function() { ws.close(); };
}

// Override navigation functions for settings page
function newConversation() { window.location.href = '/new'; }
function loadConversation(id) {
  window.location.href = '/c/' + id;
}

// Panel toggle
function togglePanel(name) {
  var panel = document.querySelector('[data-panel="' + name + '"]');
  if (!panel) return;
  panel.classList.toggle('panel-collapsed');
  var hintId = name === 'conv' ? 'convHint' : 'fnHint';
  var hint = document.getElementById(hintId);
  if (hint) hint.textContent = panel.classList.contains('panel-collapsed') ? 'Show' : 'Hide';
}

// Refresh button
function doRefreshFunctions(btn) {
  if (btn.classList.contains('spinning')) return;
  var svg = btn.querySelector('svg');
  if (!svg) return;
  btn.classList.add('spinning');
  refreshFunctions();
  svg.addEventListener('animationend', function handler() {
    svg.removeEventListener('animationend', handler);
    btn.classList.remove('spinning');
    var orig = btn.innerHTML;
    btn.innerHTML = '&#10003;';
    btn.classList.add('done');
    setTimeout(function() { btn.innerHTML = orig; btn.classList.remove('done'); }, 800);
  });
}

// Column resize
(function() {
  function setupColResize(handleId, getTarget, setSide, minW) {
    var handle = document.getElementById(handleId);
    if (!handle) return;
    handle.addEventListener('mousedown', function(e) {
      var target = getTarget();
      if (!target) return;
      e.preventDefault();
      var startX = e.clientX, startW = target.offsetWidth;
      handle.classList.add('dragging');
      target.style.transition = 'none';
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
      function onMove(ev) { target.style.width = Math.max(minW, startW + (ev.clientX - startX) * setSide) + 'px'; }
      function onUp() {
        handle.classList.remove('dragging'); target.style.transition = '';
        document.body.style.cursor = ''; document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
    });
  }
  setupColResize('sidebarResize', function() { return document.getElementById('sidebar'); }, 1, 180);
})();

// Panel resize
(function() {
  var handle = document.getElementById('panelResize');
  if (!handle) return;
  handle.addEventListener('mousedown', function(e) {
    var convPanel = document.getElementById('convPanel');
    var fnPanel = document.getElementById('fnPanel');
    var container = document.querySelector('.sidebar-panels');
    if (!convPanel || !fnPanel || !container) return;
    e.preventDefault();
    var startY = e.clientY, startConvH = convPanel.offsetHeight;
    var availableH = container.offsetHeight - handle.offsetHeight;
    var convHeaderH = convPanel.querySelector('.panel-header').offsetHeight;
    var fnHeaderH = fnPanel.querySelector('.panel-header').offsetHeight;
    handle.classList.add('dragging');
    convPanel.style.transition = 'none'; fnPanel.style.transition = 'none';
    document.body.style.cursor = 'row-resize'; document.body.style.userSelect = 'none';
    function onMove(ev) {
      var newConvH = Math.max(convHeaderH, Math.min(availableH - fnHeaderH, startConvH + ev.clientY - startY));
      convPanel.style.flex = '0 0 ' + newConvH + 'px';
      fnPanel.style.flex = '0 0 ' + (availableH - newConvH) + 'px';
      fnPanel.style.maxHeight = 'none';
    }
    function onUp() {
      handle.classList.remove('dragging'); convPanel.style.transition = ''; fnPanel.style.transition = '';
      document.body.style.cursor = ''; document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
  });
})();

// Init
connect();
loadProviders();
// Load initial settings section
var active = document.querySelector('.settings-nav-item.active');
var section = active ? active.getAttribute('data-section') : 'providers';
_loadSettingsSection(section);
</script>
</body>
</html>
